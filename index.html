<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css" />
    <title>tic tac toe</title>
  </head>
  <body>
    <h1 class="title">Tic Tac Toe</h1>
    <div class="grid-container">
      <div class="cells x">X</div>
      <div class="cells">X</div>
      <div class="cells no-r">X</div>
      <div class="cells">O</div>
      <div class="cells o">O</div>
      <div class="cells no-r">O</div>
      <div class="cells no-b">X</div>
      <div class="cells no-b">X</div>
      <div class="cells no-r no-b x">X</div>
    </div>
    <div class="score">
      <div class="player">
        player
        <div class="points">2</div>
      </div>
      <div class="tie">
        tie
        <div class="points">2</div>
      </div>
      <div class="computer">
        computer
        <div class="points">2</div>
      </div>
    </div>
    <footer>
      <p>project by sajal baral</p>
    </footer>
  </body>
</html>
