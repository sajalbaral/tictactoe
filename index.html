<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <title>tic tac toe</title>
  </head>
  <body>
    <h1 class="title">Tic Tac Toe</h1>
    <div class="board-wrapper">
      <div id="status"></div>
      <div class="grid-container">
        <div class="cells" data-index="0"></div>
        <div class="cells" data-index="1"></div>
        <div class="cells no-r" data-index="2"></div>
        <div class="cells" data-index="3"></div>
        <div class="cells" data-index="4"></div>
        <div class="cells no-r" data-index="5"></div>
        <div class="cells no-b" data-index="6"></div>
        <div class="cells no-b" data-index="7"></div>
        <div class="cells no-r no-b" data-index="8"></div>
      </div>
    </div>
    <div class="score">
      <div class="player">
        player
        <div class="points">0</div>
      </div>
      <div class="tie">
        tie
        <div class="points">0</div>
      </div>
      <div class="computer">
        computer
        <div class="points">0</div>
      </div>
      <div>
        <button id="resetScore">Reset</button>
      </div>
    </div>
    <footer>
      <p>project by sajal baral</p>
    </footer>
  </body>
</html>
